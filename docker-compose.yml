services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: signalstack-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signalstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signalstack}
      POSTGRES_DB: ${POSTGRES_DB:-signalstack}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signalstack} -d ${POSTGRES_DB:-signalstack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: signalstack-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://signalstack:signalstack@postgres:5432/signalstack?sslmode=disable}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: signalstack-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
